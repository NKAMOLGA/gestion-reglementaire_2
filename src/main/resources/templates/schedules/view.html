<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Détails planification')}"></head>

<body class="app-body" th:with="pageTitle='Détails planification', pageSubtitle=${schedule.nom}">

<div class="app-shell">
	<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

	<main class="app-main">
		<header th:replace="~{fragments/topbar :: topbar}"></header>

		<div class="page-content">

			<div class="app-card" style="max-width: 640px;">
				<div class="app-card__body">

					<ul class="detail-list">

						<li class="detail-list__item">
							<span class="detail-list__label">Identifiant</span>
							<span class="detail-list__value" th:text="${schedule.id}"></span>
						</li>

						<li class="detail-list__item">
							<span class="detail-list__label">Nom</span>
							<span class="detail-list__value" th:text="${schedule.nom}"></span>
						</li>

						<li class="detail-list__item">
							<span class="detail-list__label">Fréquence</span>
							<span class="detail-list__value" th:text="${schedule.frequenceJours} + ' jours'"></span>
						</li>

						<li class="detail-list__item">
							<span class="detail-list__label">Date début</span>
							<span class="detail-list__value" th:text="${schedule.dateDebut}"></span>
						</li>

						<li class="detail-list__item">
							<span class="detail-list__label">Date fin</span>
							<span class="detail-list__value" th:text="${schedule.dateFin}"></span>
						</li>

						<li class="detail-list__item">
							<span class="detail-list__label">Heure</span>
							<span class="detail-list__value" th:text="${schedule.heureExecution}"></span>
						</li>

						<!--  NOUVEAU : Dernier lancement -->
						<li class="detail-list__item">
							<span class="detail-list__label">Dernier lancement</span>
							<span class="detail-list__value"
								  th:text="${schedule.derniereExecution != null 
											? #temporals.format(schedule.derniereExecution, 'dd/MM/yyyy HH:mm') 
											: '-'}">
							</span>
						</li>

						<!--  NOUVEAU : Prochain lancement -->
						<li class="detail-list__item">
							<span class="detail-list__label">Prochain lancement</span>
							<span class="detail-list__value"
								  th:text="${schedule.nextRunDate != null 
											? #temporals.format(schedule.nextRunDate, 'dd/MM/yyyy HH:mm') 
											: '-'}">
							</span>
						</li>

						<li class="detail-list__item">
							<span class="detail-list__label">Statut</span>
							<span class="detail-list__value">
								<span th:if="${schedule.active}" class="badge-status badge-status--active">
									<i class="bi bi-check-circle"></i> Actif
								</span>
								<span th:if="${!schedule.active}" class="badge-status badge-status--blocked">
									<i class="bi bi-pause-circle"></i> Inactif
								</span>
							</span>
						</li>

					</ul>

					<div class="form-actions">

						<a th:href="@{'/comparaison/planificateur/' + ${schedule.id}}"
						   class="btn btn-outline-primary">
							<i class="bi bi-arrow-left-right"></i> Analyse comparative
						</a>

						<a th:href="@{'/schedules/edit/' + ${schedule.id}}"
						   class="btn btn-primary">
							<i class="bi bi-pencil"></i> Modifier
						</a>

						<a th:href="@{/schedules}"
						   class="btn btn-outline-secondary">
							<i class="bi bi-arrow-left"></i> Retour
						</a>

					</div>

				</div>
			</div>

		</div>
	</main>
</div>

</body>
</html>
