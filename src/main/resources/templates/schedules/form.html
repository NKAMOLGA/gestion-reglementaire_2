<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(#{schedules.headTitle})}"></head>
<body class="app-body" th:with="pageTitle=#{schedules.form.pageTitle},pageSubtitle=#{schedules.form.pageSubtitle}">
<div class="app-shell">
	<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
	<main class="app-main">
		<header th:replace="~{fragments/topbar :: topbar}"></header>
		<div class="page-content">
			<div class="app-card schedule-form-card">
				<div class="app-card__header">
					<h2 class="app-card__header-title">
						<i class="bi bi-calendar2-check"></i>
						<span th:text="#{schedules.form.trigger.title}">Nouveau déclencheur</span>
					</h2>
				</div>
				<div class="app-card__body">
					<form th:action="@{/schedules/save}" th:object="${schedule}" method="post" id="scheduleForm"
						  autocomplete="off" th:attr="data-is-new=${isNewSchedule}">
						<input type="hidden" th:field="*{id}">

						<div class="mb-3">
							<label class="form-label"><i class="bi bi-tag me-1"></i> <span th:text="#{common.name}">Nom</span></label>
							<input class="form-control" th:field="*{nom}" required>
						</div>

						<div class="mb-3">
							<label class="form-label"><i class="bi bi-arrow-repeat me-1"></i> <span th:text="#{schedules.form.recurrence.label}">Type de déclenchement</span></label>
							<select class="form-select" th:field="*{typeRecurrence}" id="typeRecurrence">
								<option value="MONTHLY" th:text="#{schedules.form.recurrence.monthly}">Chaque mois</option>
								<option value="DAILY" th:text="#{schedules.form.recurrence.daily}">Tous les N jours</option>
							</select>
						</div>

						<div id="monthlySection" class="schedule-trigger-panel">
							<div class="mb-3">
								<div class="d-flex justify-content-between align-items-center mb-2">
									<label class="form-label mb-0"><i class="bi bi-calendar3 me-1"></i> <span th:text="#{schedules.form.months.label}">Mois</span></label>
									<button type="button" class="btn btn-sm btn-outline-secondary" id="selectAllMonths" th:text="#{schedules.form.selectAllMonths}">Tout sélectionner</button>
								</div>
								<div class="schedule-month-grid">
									<label class="schedule-check" th:each="m : ${allMonths}">
										<input type="checkbox" name="selectedMonths" th:value="${m}"
											   th:checked="${isNewSchedule != true and selectedMonths != null and #lists.contains(selectedMonths, m)}">
										<span th:text="#{${'schedules.form.month.' + m}}">Mois</span>
									</label>
								</div>
							</div>

							<div class="mb-3">
								<div class="d-flex justify-content-between align-items-center mb-2">
									<label class="form-label mb-0"><i class="bi bi-calendar-day me-1"></i> <span th:text="#{schedules.form.days.label}">Jours du mois</span></label>
									<button type="button" class="btn btn-sm btn-outline-secondary" id="selectAllDays" th:text="#{schedules.form.selectAllDays}">Tout sélectionner</button>
								</div>
								<div class="schedule-day-grid">
									<label class="schedule-check" th:each="d : ${#numbers.sequence(1, 31)}">
										<input type="checkbox" name="selectedDays" th:value="${d}"
											   th:checked="${isNewSchedule != true and selectedDays != null and #lists.contains(selectedDays, d)}">
										<span th:text="${d}">1</span>
									</label>
								</div>
							</div>
						</div>

						<div id="dailySection" class="schedule-trigger-panel" style="display:none;">
							<div class="mb-3">
								<label class="form-label"><i class="bi bi-arrow-repeat me-1"></i> <span th:text="#{schedules.form.frequency.label}">Fréquence (jours)</span></label>
								<input type="number" class="form-control" th:field="*{frequenceJours}" min="1">
							</div>
						</div>

						<div class="row g-3">
							<div class="col-md-6">
								<label class="form-label"><i class="bi bi-calendar-event me-1"></i> <span th:text="#{schedules.form.start.label}">Début</span></label>
								<input type="datetime-local" class="form-control" th:field="*{dateDebut}" required>
							</div>
							<div class="col-md-6">
								<label class="form-label"><i class="bi bi-calendar-x me-1"></i> <span th:text="#{schedules.form.expiration.label}">Expiration</span></label>
								<input type="datetime-local" class="form-control" th:field="*{dateFin}">
							</div>
						</div>

						<div class="mb-3 mt-3">
							<label class="form-label"><i class="bi bi-clock me-1"></i> <span th:text="#{schedules.form.executionTime.label}">Heure d'exécution</span></label>
							<input type="time" class="form-control" th:field="*{heureExecution}" required>
							<div class="form-text" th:text="#{schedules.form.executionTime.help}">Heure appliquée à chaque jour planifié.</div>
						</div>

						<div class="form-check mb-3">
							<input type="checkbox" class="form-check-input" th:field="*{active}" id="activeCheck">
							<label class="form-check-label" for="activeCheck" th:text="#{schedules.form.active.label}">Planification active</label>
						</div>

						<div class="form-actions">
							<button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> <span th:text="#{common.save}">Enregistrer</span></button>
							<a th:href="@{/schedules}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> <span th:text="#{common.back}">Retour</span></a>
						</div>
					</form>
				</div>
			</div>
		</div>
	</main>
</div>
<script th:src="@{/js/schedule-form.js}"></script>
</body>
</html>
