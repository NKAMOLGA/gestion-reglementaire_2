<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Historique COL')}"></head>
<body class="app-body" th:with="pageTitle='Historique COL', pageSubtitle='Consultez les générations passées'">
<div class="app-shell">
	<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
	<main class="app-main">
		<header th:replace="~{fragments/topbar :: topbar}"></header>
		<div class="page-content">

			<div class="filter-panel">
				<div class="filter-panel__title"><i class="bi bi-funnel"></i> Filtres de recherche</div>
				<form method="get" th:action="@{/historique}">
					<div class="row g-3">
						<div class="col-md-3">
							<label class="form-label">Utilisateur</label>
							<input type="text" name="utilisateur" class="form-control" placeholder="Nom d'utilisateur" th:value="${utilisateur}">
						</div>
						<div class="col-md-3">
							<label class="form-label">Fichier</label>
							<input type="text" name="nomFichier" class="form-control" placeholder="Nom du fichier" th:value="${nomFichier}">
						</div>
						<!--<div class="col-md-3">
							<label class="form-label">Date début</label>
							<input type="datetime-local" name="dateDebut" class="form-control">
						</div>
						<div class="col-md-3">
							<label class="form-label">Date fin</label>
							<input type="datetime-local" name="dateFin" class="form-control">
						</div>-->
					</div>
					<div class="form-actions" style="border: none; padding-top: 1rem; margin-top: 0;">
						<button type="submit" class="btn btn-primary"><i class="bi bi-search"></i> Rechercher</button>
						<a th:href="@{/historique}" class="btn btn-outline-secondary"><i class="bi bi-arrow-counterclockwise"></i> Réinitialiser</a>
					</div>
				</form>
			</div>

			<div class="app-card">
				<div class="app-card__body app-card__body--flush">
					<div class="app-table-wrap">
						<table class="app-table">
							<thead>
							<tr><th>Date</th><th>Utilisateur</th><th>Fichier</th><th>Actions</th></tr>
							</thead>
							<tbody>
							<tr th:if="${#lists.isEmpty(historiques)}">
								<td colspan="4"><div class="empty-state"><i class="bi bi-inbox"></i><p>Aucun résultat trouvé</p></div></td>
							</tr>
							<tr th:each="h : ${historiques}">
								<td th:text="${h.dateGeneration}"></td>
								<td th:text="${h.utilisateur}"></td>
								<td th:text="${h.nomFichier}"></td>
								<td>
									<a class="btn btn-outline-primary btn-sm" th:href="@{'/downloads/view'(filename=${h.nomFichier})}">
										<i class="bi bi-eye"></i> Voir
									</a>
								</td>
							</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	</main>
</div>
</body>
</html>
