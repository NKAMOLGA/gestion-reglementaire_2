<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(#{history.pageTitle})}"></head>
<body class="app-body" th:with="pageTitle=#{history.pageTitle},pageSubtitle=#{history.pageSubtitle}">
<div class="app-shell">
	<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
	<main class="app-main">
		<header th:replace="~{fragments/topbar :: topbar}"></header>
		<div class="page-content">

			<div class="filter-panel">
				<div class="filter-panel__title"><i class="bi bi-funnel"></i> <span th:text="#{history.filters.title}">Filtres de recherche</span></div>
				<form method="get" th:action="@{/historique}">
					<div class="row g-3">
						<div class="col-md-3">
							<label class="form-label" th:text="#{common.user}">Utilisateur</label>
							<input type="text" name="utilisateur" class="form-control" th:placeholder="#{history.filters.username.placeholder}" th:value="${utilisateur}">
						</div>
						<div class="col-md-3">
							<label class="form-label" th:text="#{common.file}">Fichier</label>
							<input type="text" name="nomFichier" class="form-control" th:placeholder="#{history.filters.filename.placeholder}" th:value="${nomFichier}">
						</div>
					</div>
					<div class="form-actions" style="border: none; padding-top: 1rem; margin-top: 0;">
						<button type="submit" class="btn btn-primary"><i class="bi bi-search"></i> <span th:text="#{common.search}">Rechercher</span></button>
						<a th:href="@{/historique}" class="btn btn-outline-secondary"><i class="bi bi-arrow-counterclockwise"></i> <span th:text="#{common.reset}">Réinitialiser</span></a>
					</div>
				</form>
			</div>

			<div class="app-card">
				<div class="app-card__body app-card__body--flush">
					<div class="app-table-wrap">
						<table class="app-table">
							<thead>
							<tr>
								<th th:text="#{common.date}">Date</th>
								<th th:text="#{common.user}">Utilisateur</th>
								<th th:text="#{common.file}">Fichier</th>
								<th th:text="#{common.actions}">Actions</th>
							</tr>
							</thead>
							<tbody>
							<tr th:if="${#lists.isEmpty(historiques)}">
								<td colspan="4"><div class="empty-state"><i class="bi bi-inbox"></i><p th:text="#{history.empty}">Aucun résultat trouvé</p></div></td>
							</tr>
							<tr th:each="h : ${historiques}">
								<td th:text="${h.dateGeneration}"></td>
								<td th:text="${h.utilisateur}"></td>
								<td th:text="${h.nomFichier}"></td>
								<td>
									<a class="btn btn-outline-primary btn-sm" th:href="@{'/downloads/view'(filename=${h.nomFichier})}">
										<i class="bi bi-eye"></i> <span th:text="#{common.view}">Voir</span>
									</a>
								</td>
							</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	</main>
</div>
</body>
</html>
