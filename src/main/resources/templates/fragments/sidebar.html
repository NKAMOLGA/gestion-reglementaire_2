<aside th:fragment="sidebar"
	   class="app-sidebar"
	   xmlns:th="http://www.thymeleaf.org"
	   xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

	<div class="sidebar-brand">
		<img th:src="@{/images/bc-pme-logo.png}" alt="BC-PME" class="sidebar-brand__logo">
		<div class="sidebar-brand__text">
			<span class="sidebar-brand__name">Gestion Réglementaire</span>
			<span class="sidebar-brand__org">BC-PME SA</span>
		</div>
	</div>

	<nav class="sidebar-nav">
		<a class="sidebar-link"
		   th:classappend="${#strings.startsWith(currentUri, '/dashboard')} ? ' active' : ''"
		   th:href="@{/dashboard}">
			<i class="bi bi-speedometer2"></i>
			<span>Tableau de bord</span>
		</a>

		<a class="sidebar-link"
		   th:classappend="${#strings.startsWith(currentUri, '/generation-col')} ? ' active' : ''"
		   th:href="@{/generation-col}">
			<i class="bi bi-file-earmark-arrow-up"></i>
			<span>Génération COL</span>
		</a>

		<a class="sidebar-link"
		   th:classappend="${#strings.startsWith(currentUri, '/historique')} ? ' active' : ''"
		   th:href="@{/historique}">
			<i class="bi bi-clock-history"></i>
			<span>Historique</span>
		</a>

		<a class="sidebar-link"
		   th:classappend="${#strings.startsWith(currentUri, '/downloads')} ? ' active' : ''"
		   th:href="@{/downloads}">
			<i class="bi bi-download"></i>
			<span>Téléchargements</span>
		</a>

		<a class="sidebar-link"
		   th:classappend="${#strings.startsWith(currentUri, '/comparaison')} ? ' active' : ''"
		   th:href="@{/comparaison}">
			<i class="bi bi-arrow-left-right"></i>
			<span>Analyse comparative</span>
		</a>

		<a class="sidebar-link"
		   th:classappend="${#strings.startsWith(currentUri, '/schedules')} ? ' active' : ''"
		   th:href="@{/schedules}">
			<i class="bi bi-calendar-check"></i>
			<span>Planification COL</span>
		</a>

		<a class="sidebar-link"
		   sec:authorize="hasAuthority('DSIO')"
		   th:classappend="${#strings.startsWith(currentUri, '/utilisateurs')} ? ' active' : ''"
		   th:href="@{/utilisateurs}">
			<i class="bi bi-people"></i>
			<span>Utilisateurs</span>
		</a>
	</nav>

	<div class="sidebar-footer">
		<form th:action="@{/logout}" method="post">
			<button type="submit" class="sidebar-link sidebar-link--logout">
				<i class="bi bi-box-arrow-left"></i>
				<span>Déconnexion</span>
			</button>
		</form>
	</div>
</aside>
