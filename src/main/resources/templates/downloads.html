<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(#{downloads.pageTitle})}"></head>
<body class="app-body" th:with="pageTitle=#{downloads.pageTitle},pageSubtitle=#{downloads.pageSubtitle}">
<div class="app-shell">
	<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
	<main class="app-main">
		<header th:replace="~{fragments/topbar :: topbar}"></header>
		<div class="page-content">
			<div class="app-card">
				<div class="app-card__body app-card__body--flush">
					<div class="app-table-wrap">
						<table class="app-table">
							<thead>
							<tr>
								<th th:text="#{common.filename}">Nom du fichier</th>
								<th th:text="#{common.size}">Taille</th>
								<th th:text="#{common.action}">Action</th>
							</tr>
							</thead>
							<tbody>
							<tr th:if="${#lists.isEmpty(fichiers)}">
								<td colspan="3"><div class="empty-state"><i class="bi bi-folder2-open"></i><p th:text="#{downloads.empty}">Aucun fichier disponible</p></div></td>
							</tr>
							<tr th:each="f : ${fichiers}">
								<td><i class="bi bi-file-earmark-text text-muted me-1"></i><span th:text="${f.name}"></span></td>
								<td th:text="#{common.fileSize.bytes(${f.size})}"></td>
								<td>
									<a class="btn btn-primary btn-sm" th:href="@{'/downloads/file'(filename=${f.name})}">
										<i class="bi bi-download"></i> <span th:text="#{common.download}">Télécharger</span>
									</a>
								</td>
							</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	</main>
</div>
</body>
</html>
