<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(#{dashboard.pageTitle})}"></head>
<body class="app-body" th:with="pageTitle=#{dashboard.pageTitle},pageSubtitle=#{dashboard.pageSubtitle}">
<div class="app-shell">
	<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
	<main class="app-main">
		<header th:replace="~{fragments/topbar :: topbar}"></header>

		<div class="page-content">

			<div class="welcome-banner">
				<div>
					<h2 class="welcome-banner__title">
						<span th:text="#{dashboard.greeting}">Bonjour,</span> <span sec:authentication="name">Utilisateur</span>
					</h2>
					<p class="welcome-banner__text" th:text="#{dashboard.welcome}">Bienvenue sur votre espace Réserve Obligatoire BC-PME.</p>
				</div>
				<div class="welcome-banner__icon">
					<i class="bi bi-bank2"></i>
				</div>
			</div>

			<div class="kpi-grid">
				<div class="kpi-card">
					<div class="kpi-card__icon kpi-card__icon--primary"><i class="bi bi-files"></i></div>
					<div>
						<div class="kpi-card__label" th:text="#{dashboard.kpi.totalFiles}">Total fichiers</div>
						<div class="kpi-card__value" th:text="${total}">0</div>
					</div>
				</div>
				<div class="kpi-card">
					<div class="kpi-card__icon kpi-card__icon--success"><i class="bi bi-check-circle"></i></div>
					<div>
						<div class="kpi-card__label" th:text="#{common.status.success}">Succès</div>
						<div class="kpi-card__value" th:text="${success}">0</div>
					</div>
				</div>
				<div class="kpi-card">
					<div class="kpi-card__icon kpi-card__icon--danger"><i class="bi bi-x-circle"></i></div>
					<div>
						<div class="kpi-card__label" th:text="#{dashboard.kpi.errors}">Erreurs</div>
						<div class="kpi-card__value" th:text="${error}">0</div>
					</div>
				</div>
				<div class="kpi-card">
					<div class="kpi-card__icon kpi-card__icon--info"><i class="bi bi-people"></i></div>
					<div>
						<div class="kpi-card__label" th:text="#{dashboard.kpi.activeUsers}">Utilisateurs actifs</div>
						<div class="kpi-card__value" th:text="${users}">0</div>
					</div>
				</div>
			</div>

			<div class="app-card">
				<div class="app-card__header">
					<h2 class="app-card__header-title">
						<i class="bi bi-activity"></i> <span th:text="#{dashboard.recentActivity.title}">Activité récente</span>
					</h2>
				</div>
				<div class="app-card__body app-card__body--flush">
					<div class="app-table-wrap">
						<table class="app-table">
							<thead>
							<tr>
								<th th:text="#{common.date}">Date</th>
								<th th:text="#{common.user}">Utilisateur</th>
								<th th:text="#{common.file}">Fichier</th>
								<th th:text="#{common.status}">Statut</th>
							</tr>
							</thead>
							<tbody>
							<tr th:each="h : ${latest}">
								<td th:text="${h.dateGeneration}"></td>
								<td th:text="${h.utilisateur}"></td>
								<td th:text="${h.nomFichier}"></td>
								<td>
									<span class="badge-status badge-status--success" th:if="${h.statut == 'SUCCESS'}">
										<i class="bi bi-check-lg"></i> <span th:text="#{common.status.success}">Succès</span>
									</span>
									<span class="badge-status badge-status--danger" th:if="${h.statut == 'ERROR'}">
										<i class="bi bi-x-lg"></i> <span th:text="#{common.status.error}">Erreur</span>
									</span>
									<span class="badge-status badge-status--neutral"
										  th:if="${h.statut != 'SUCCESS' and h.statut != 'ERROR'}"
										  th:text="${h.statut}"></span>
								</td>
							</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>

		</div>
	</main>
</div>
</body>
</html>
