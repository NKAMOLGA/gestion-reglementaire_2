<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(#{users.create.pageTitle})}"></head>
<body class="app-body" th:with="pageTitle=#{users.create.pageTitle},pageSubtitle=#{users.create.pageSubtitle}">
<div class="app-shell">
	<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
	<main class="app-main">
		<header th:replace="~{fragments/topbar :: topbar}"></header>
		<div class="page-content">
			<div class="app-card" style="max-width: 560px;">
				<div class="app-card__body">
					<form th:action="@{/utilisateurs/save}" method="post" th:object="${utilisateur}">
						<div class="mb-3">
							<label class="form-label"><i class="bi bi-person me-1"></i> <span th:text="#{common.username}">Nom d'utilisateur</span></label>
							<input type="text" class="form-control" th:field="*{username}" required>
						</div>
						<div class="mb-3">
							<label class="form-label"><i class="bi bi-key me-1"></i> <span th:text="#{common.password}">Mot de passe</span></label>
							<input type="password" class="form-control" th:field="*{password}" required>
						</div>
						<div class="mb-3">
							<label class="form-label"><i class="bi bi-shield me-1"></i> <span th:text="#{common.role}">Rôle</span></label>
							<select class="form-select" th:field="*{role}">
								<option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.name}"></option>
							</select>
						</div>
						<div class="mb-3">
							<label class="form-label"><i class="bi bi-toggle-on me-1"></i> <span th:text="#{common.status}">Statut</span></label>
							<select class="form-select" th:field="*{actif}">
								<option value="true" th:text="#{common.status.active}">Actif</option>
								<option value="false" th:text="#{common.status.blocked}">Bloqué</option>
							</select>
						</div>
						<div class="form-actions">
							<button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> <span th:text="#{common.save}">Enregistrer</span></button>
							<a th:href="@{/utilisateurs}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> <span th:text="#{common.back}">Retour</span></a>
						</div>
					</form>
				</div>
			</div>
		</div>
	</main>
</div>
</body>
</html>
