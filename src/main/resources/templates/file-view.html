<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(#{fileView.headTitle})}"></head>
<body class="app-body" th:with="pageTitle=#{fileView.pageTitle},pageSubtitle=${filename}">
<div class="app-shell">
	<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
	<main class="app-main">
		<header th:replace="~{fragments/topbar :: topbar}"></header>
		<div class="page-content">
			<div class="page-toolbar">
				<a th:href="@{/historique}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> <span th:text="#{common.back}">Retour</span></a>
			</div>
			<div class="app-card">
				<div class="app-card__header">
					<h2 class="app-card__header-title"><i class="bi bi-braces"></i> <span th:text="#{fileView.content.title}">Contenu</span></h2>
				</div>
				<div class="app-card__body">
					<pre class="file-viewer" th:text="${content}"></pre>
				</div>
			</div>
		</div>
	</main>
</div>
</body>
</html>
