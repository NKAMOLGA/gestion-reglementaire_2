<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(#{comparison.matrix.pageTitle})}"></head>
<body class="app-body" th:with="pageTitle=${schedule.nom},pageSubtitle=#{comparison.matrix.pageSubtitle}">
<div class="app-shell">
	<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
	<main class="app-main">
		<header th:replace="~{fragments/topbar :: topbar}"></header>
		<div class="page-content">

			<div class="d-flex gap-2 mb-3 flex-wrap">
				<a th:href="@{/comparaison/planificateur}" class="btn btn-outline-secondary">
					<i class="bi bi-arrow-left"></i> <span th:text="#{comparison.backToPlanners}">Retour aux planificateurs</span>
				</a>
			</div>

			<div class="app-card">
				<div class="app-card__header">
					<h2 class="app-card__header-title">
						<i class="bi bi-table"></i>
						<span th:text="#{comparison.matrix.title}">Montants par compte et par date métier</span>
					</h2>
				</div>
				<div class="app-card__body app-card__body--flush">
					<div th:if="${#lists.isEmpty(matrix.rows)}" class="empty-state p-4">
						<i class="bi bi-inbox"></i>
						<p th:text="#{comparison.matrix.empty}">Aucun fichier COL généré pour ce planificateur</p>
					</div>

					<div th:unless="${#lists.isEmpty(matrix.rows)}" class="app-table-wrap">
						<table class="app-table comparison-matrix">
							<thead>
							<tr>
								<th th:text="#{comparison.matrix.dateColumn}">Date</th>
								<th th:each="code : ${matrix.accountCodes}">
									<a class="comparison-matrix__header-link"
									   th:href="@{'/comparaison/planificateur/' + ${schedule.id} + '/compte/' + ${code}}"
									   th:text="${code}"
									   th:title="#{comparison.matrix.viewTrend}">H71</a>
								</th>
							</tr>
							</thead>
							<tbody>
							<tr th:each="row : ${matrix.rows}">
								<td th:text="${#temporals.format(row.businessDate(), 'dd/MM/yyyy')}">10/06/2026</td>
								<td th:each="code : ${matrix.accountCodes}">
									<span th:if="${row.amounts().containsKey(code)}"
										  th:text="${#numbers.formatDecimal(row.amounts().get(code), 1, 'POINT', 2, 'COMMA')}">0</span>
									<span th:unless="${row.amounts().containsKey(code)}">—</span>
								</td>
							</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>

		</div>
	</main>
</div>
</body>
</html>
