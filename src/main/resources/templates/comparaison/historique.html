<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Historique comparaisons')}"></head>
<body class="app-body" th:with="pageTitle=|Historique des comparaisons|,pageSubtitle=|Consulter les analyses réalisées|">
<div class="app-shell">
	<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
	<main class="app-main">
		<header th:replace="~{fragments/topbar :: topbar}"></header>
		<div class="page-content">

			<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
				<div th:if="${planificateurId != null}" class="text-muted">
					<i class="bi bi-funnel me-1"></i> Filtré par planificateur #<span th:text="${planificateurId}"></span>
					<a th:href="@{/comparaison/historique}" class="ms-2">Voir tout</a>
				</div>
				<div th:if="${suiviId != null}" class="text-muted">
					<i class="bi bi-funnel me-1"></i> Filtré par suivi #<span th:text="${suiviId}"></span>
					<a th:href="@{/comparaison/historique}" class="ms-2">Voir tout</a>
				</div>
				<a th:href="@{/comparaison}" class="btn btn-outline-secondary ms-auto">
					<i class="bi bi-arrow-left"></i> Retour
				</a>
			</div>

			<div class="app-card">
				<div class="app-card__header">
					<h2 class="app-card__header-title"><i class="bi bi-clock-history"></i> Comparaisons enregistrées</h2>
				</div>
				<div class="app-card__body app-card__body--flush">
					<div class="app-table-wrap">
						<table class="app-table">
							<thead>
							<tr>
								<th>Date</th>
								<th>Fichier A</th>
								<th>Fichier B</th>
								<th>Action</th>
							</tr>
							</thead>
							<tbody>
							<tr th:if="${#lists.isEmpty(entries)}">
								<td colspan="7">
									<div class="empty-state">
										<i class="bi bi-inbox"></i>
										<p>Aucune comparaison enregistrée pour le moment</p>
									</div>
								</td>
							</tr>
							<tr th:each="e : ${entries}">
								<td th:text="${#temporals.format(e.dateComparaison, 'dd/MM/yyyy HH:mm')}"></td>
								
								<td>
									<i class="bi bi-file-earmark-text text-muted me-1"></i>
									<span th:text="${e.fichierA}"></span>
								</td>
								<td>
									<i class="bi bi-file-earmark-text text-muted me-1"></i>
									<span th:text="${e.fichierB}"></span>
								</td>
								<td>
									<a th:href="@{'/comparaison/resultat/' + ${e.id}}" class="btn btn-primary btn-sm">
										<i class="bi bi-eye"></i> Voir le rendu
									</a>
								</td>
							</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>

		</div>
	</main>
</div>
</body>
</html>
