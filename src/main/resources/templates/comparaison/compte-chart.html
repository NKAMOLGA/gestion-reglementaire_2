<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(#{comparison.accountChart.pageTitle})}"></head>
<body class="app-body"
	  th:with="pageTitle=${trend.accountCode()},pageSubtitle=${trend.libelle()}">
<div class="app-shell">
	<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
	<main class="app-main">
		<header th:replace="~{fragments/topbar :: topbar}"></header>
		<div class="page-content">

			<div class="d-flex gap-2 mb-3 flex-wrap">
				<a th:href="@{'/comparaison/planificateur/' + ${schedule.id}}" class="btn btn-outline-secondary">
					<i class="bi bi-arrow-left"></i> <span th:text="#{comparison.backToMatrix}">Retour au tableau</span>
				</a>
			</div>

			<div class="app-card">
				<div class="app-card__header">
					<h2 class="app-card__header-title">
						<i class="bi bi-graph-up"></i>
						<span th:text="#{comparison.accountChart.title}">Évolution du montant</span>
					</h2>
				</div>
				<div class="app-card__body">
					<p class="text-muted mb-3">
						<strong th:text="${trend.accountCode()}">H71</strong>
						<span th:if="${trend.libelle() != null and trend.libelle() != trend.accountCode()}"
							  th:text="' — ' + ${trend.libelle()}"></span>
					</p>

					<div th:if="${#lists.isEmpty(trend.points())}" class="empty-state">
						<i class="bi bi-bar-chart"></i>
						<p th:text="#{comparison.accountChart.empty}">Aucune donnée pour ce compte</p>
					</div>

					<div th:unless="${#lists.isEmpty(trend.points())}" class="chart-container chart-container--trend">
						<canvas id="accountTrendChart"></canvas>
					</div>
				</div>
			</div>

		</div>
	</main>
</div>

<script type="application/json" id="trend-data" th:utext="${trendJson}"></script>
<div id="chart-i18n"
	 th:attr="data-amount=#{comparison.accountChart.amountAxis},data-date=#{comparison.matrix.dateColumn}"
	 hidden></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script th:src="@{/js/compte-chart.js}"></script>
</body>
</html>
