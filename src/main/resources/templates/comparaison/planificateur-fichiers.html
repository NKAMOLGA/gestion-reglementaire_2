<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Fichiers planificateur')}"></head>
<body class="app-body" th:with="pageTitle=${schedule.nom},pageSubtitle=|Comparaison des fichiers générés|">
<div class="app-shell">
	<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
	<main class="app-main">
		<header th:replace="~{fragments/topbar :: topbar}"></header>
		<div class="page-content">

			<div th:if="${error}" class="alert alert-danger">
				<i class="bi bi-exclamation-triangle me-1"></i>
				<span th:text="${error}"></span>
			</div>

			<div class="d-flex gap-2 mb-3 flex-wrap">
				<a th:href="@{'/comparaison/planificateur/' + ${schedule.id} + '/derniers'}"
				   class="btn btn-primary"
				   th:if="${fichiers != null and fichiers.size() >= 2}">
					<i class="bi bi-lightning"></i> Comparer les 2 derniers fichiers
				</a>
				<a th:href="@{/comparaison/planificateur}" class="btn btn-outline-secondary">
					<i class="bi bi-arrow-left"></i> Retour
				</a>
			</div>

			<div class="app-card mb-4" style="max-width: 640px;">
				<div class="app-card__header">
					<h2 class="app-card__header-title"><i class="bi bi-arrow-left-right"></i> Comparaison personnalisée</h2>
				</div>
				<div class="app-card__body">
					<form th:action="@{'/comparaison/planificateur/' + ${schedule.id}}" method="post">
						<div class="mb-3">
							<label class="form-label">Fichier de référence (A)</label>
							<select class="form-select" name="fichierA" required>
								<option value="">— Choisir —</option>
								<option th:each="f : ${fichiers}" th:value="${f.nomFichier}"
										th:text="${f.nomFichier + ' (' + f.dateGeneration + ')'}"></option>
							</select>
						</div>
						<div class="mb-3">
							<label class="form-label">Fichier à comparer (B)</label>
							<select class="form-select" name="fichierB" required>
								<option value="">— Choisir —</option>
								<option th:each="f : ${fichiers}" th:value="${f.nomFichier}"
										th:text="${f.nomFichier + ' (' + f.dateGeneration + ')'}"></option>
							</select>
						</div>
						<button type="submit" class="btn btn-primary">
							<i class="bi bi-search"></i> Comparer
						</button>
					</form>
				</div>
			</div>

			<div class="app-card">
				<div class="app-card__header">
					<h2 class="app-card__header-title"><i class="bi bi-clock-history"></i> Fichiers de la période</h2>
				</div>
				<div class="app-card__body app-card__body--flush">
					<div class="app-table-wrap">
						<table class="app-table">
							<thead>
							<tr><th>Date</th><th>Fichier</th><th>Utilisateur</th></tr>
							</thead>
							<tbody>
							<tr th:if="${#lists.isEmpty(fichiers)}">
								<td colspan="3">
									<div class="empty-state">
										<i class="bi bi-folder2-open"></i>
										<p>Aucun fichier dans la période de cette planification</p>
									</div>
								</td>
							</tr>
							<tr th:each="f : ${fichiers}">
								<td th:text="${f.dateGeneration}"></td>
								<td th:text="${f.nomFichier}"></td>
								<td th:text="${f.utilisateur}"></td>
							</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>

		</div>
	</main>
</div>
</body>
</html>
