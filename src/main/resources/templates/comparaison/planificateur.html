<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(#{comparison.planner.pageTitle})}"></head>
<body class="app-body" th:with="pageTitle=#{comparison.planner.pageTitle},pageSubtitle=#{comparison.planner.pageSubtitle}">
<div class="app-shell">
	<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
	<main class="app-main">
		<header th:replace="~{fragments/topbar :: topbar}"></header>
		<div class="page-content">

			<div class="app-card">
				<div class="app-card__header">
					<h2 class="app-card__header-title"><i class="bi bi-calendar-check"></i> <span th:text="#{comparison.planner.choose.title}">Choisir une planification</span></h2>
				</div>
				<div class="app-card__body app-card__body--flush">
					<div class="app-table-wrap">
						<table class="app-table">
							<thead>
							<tr>
								<th th:text="#{common.name}">Nom</th>
								<th th:text="#{common.frequency}">Fréquence</th>
								<th th:text="#{common.period}">Période</th>
								<th th:text="#{common.status}">Statut</th>
								<th th:text="#{common.action}">Action</th>
							</tr>
							</thead>
							<tbody>
							<tr th:if="${#lists.isEmpty(schedules)}">
								<td colspan="5">
									<div class="empty-state">
										<i class="bi bi-calendar-x"></i>
										<p th:text="#{comparison.planner.empty}">Aucune planification COL configurée</p>
									</div>
								</td>
							</tr>
							<tr th:each="s : ${schedules}">
								<td th:text="${s.nom}"></td>
								<td th:text="${@scheduleHelper.format(s)}"></td>
								<td>
									<span th:text="${s.dateDebut}"></span> → <span th:text="${s.dateFin}"></span>
								</td>
								<td>
									<span th:if="${s.active}" class="badge-status badge-status--success" th:text="#{common.status.active}">Actif</span>
									<span th:unless="${s.active}" class="badge-status badge-status--neutral" th:text="#{common.status.inactive}">Inactif</span>
								</td>
								<td>
									<a th:href="@{'/comparaison/planificateur/' + ${s.id}}" class="btn btn-primary btn-sm">
										<i class="bi bi-table"></i> <span th:text="#{comparison.viewMatrix}">Voir le tableau</span>
									</a>
								</td>
							</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>

		</div>
	</main>
</div>
</body>
</html>
