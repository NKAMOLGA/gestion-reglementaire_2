<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Comparaison planificateur')}"></head>
<body class="app-body" th:with="pageTitle=|Comparaison planificateur|,pageSubtitle=|Étude comparative depuis une planification COL|">
<div class="app-shell">
	<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
	<main class="app-main">
		<header th:replace="~{fragments/topbar :: topbar}"></header>
		<div class="page-content">

			<div class="app-card">
				<div class="app-card__header">
					<h2 class="app-card__header-title"><i class="bi bi-calendar-check"></i> Choisir une planification</h2>
				</div>
				<div class="app-card__body app-card__body--flush">
					<div class="app-table-wrap">
						<table class="app-table">
							<thead>
							<tr>
								<th>Nom</th>
								<th>Fréquence</th>
								<th>Période</th>
								<th>Statut</th>
								<th>Action</th>
							</tr>
							</thead>
							<tbody>
							<tr th:if="${#lists.isEmpty(schedules)}">
								<td colspan="5">
									<div class="empty-state">
										<i class="bi bi-calendar-x"></i>
										<p>Aucune planification COL configurée</p>
									</div>
								</td>
							</tr>
							<tr th:each="s : ${schedules}">
								<td th:text="${s.nom}"></td>
								<td th:text="${s.frequenceJours} + ' jours'"></td>
								<td>
									<span th:text="${s.dateDebut}"></span> → <span th:text="${s.dateFin}"></span>
								</td>
								<td>
									<span th:if="${s.active}" class="badge-status badge-status--success">Actif</span>
									<span th:unless="${s.active}" class="badge-status badge-status--neutral">Inactif</span>
								</td>
								<td>
									<a th:href="@{'/comparaison/planificateur/' + ${s.id}}" class="btn btn-primary btn-sm">
										<i class="bi bi-arrow-left-right"></i> Comparer
									</a>
								</td>
							</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>

			<div class="mt-3">
				<a th:href="@{/comparaison}" class="btn btn-outline-secondary">
					<i class="bi bi-arrow-left"></i> Retour
				</a>
			</div>

		</div>
	</main>
</div>
</body>
</html>
