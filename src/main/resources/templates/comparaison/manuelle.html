<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Comparaison manuelle')}"></head>
<body class="app-body" th:with="pageTitle=|Comparaison manuelle|,pageSubtitle=|Choisir deux fichiers COL à comparer|">
<div class="app-shell">
	<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
	<main class="app-main">
		<header th:replace="~{fragments/topbar :: topbar}"></header>
		<div class="page-content">

			<div th:if="${error}" class="alert alert-danger">
				<i class="bi bi-exclamation-triangle me-1"></i>
				<span th:text="${error}"></span>
			</div>

			<div class="app-card" style="max-width: 640px;">
				<div class="app-card__header">
					<h2 class="app-card__header-title"><i class="bi bi-arrow-left-right"></i> Sélection des fichiers</h2>
				</div>
				<div class="app-card__body">
					<form th:action="@{/comparaison/manuelle}" method="post">
						<div class="mb-3">
							<label class="form-label"><i class="bi bi-file-earmark me-1"></i> Fichier de référence (A)</label>
							<select class="form-select" name="fichierA" required>
								<option value="">— Choisir un fichier —</option>
								<option th:each="f : ${fichiers}" th:value="${f.name}" th:text="${f.name}"></option>
							</select>
						</div>
						<div class="mb-3">
							<label class="form-label"><i class="bi bi-file-earmark-diff me-1"></i> Fichier à comparer (B)</label>
							<select class="form-select" name="fichierB" required>
								<option value="">— Choisir un fichier —</option>
								<option th:each="f : ${fichiers}" th:value="${f.name}" th:text="${f.name}"></option>
							</select>
						</div>
						<div class="form-actions">
							<button type="submit" class="btn btn-primary">
								<i class="bi bi-search"></i> Lancer la comparaison
							</button>
							<a th:href="@{/comparaison}" class="btn btn-outline-secondary">
								<i class="bi bi-arrow-left"></i> Retour
							</a>
						</div>
					</form>
				</div>
			</div>

		</div>
	</main>
</div>
</body>
</html>
